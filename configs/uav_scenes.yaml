    #     1176.0584117437975,
    #     1047.5184035578786,
    #   ]
    params:
      [1481.705078125, 1481.705078125, 1175.9687937450362, 1050.2202901721903]

    distortion: []

  dataset_path: "/mnt/sda/MapScape/query"
  dataset_name: "interval1_HKairport_GNSS03"
  output_name: "interval1_HKairport_GNSS03"
  use_kf: false
  padding: True
  refine:
