params:
  #
  # 起始点（经度, 纬度, 高程），100+550 计算后为 650
  ABS_INIT: [7.616680, 46.742025]
  HEIGHT_INIT: 600  #50+500 [200, 300, 400, 500]
  # 姿态角（单位：度）
  HEIGHT_CHOICE: [500, 400, 300, 200, 100]
  PITCH_AMPLITUDE: 25
  
  # 轨迹生成参数
  NUM_POINTS: 900       # 轨迹点数量
  TOTAL_LENGTH: 300      # 飞行总距离（单位：米），用于 x 方向
  N: 10                   # 绕圈因子

  # 输出路径（请根据实际情况修改）
  POSE_OUTPUT_DIR: "/mnt/sda/MapScape/query/poses/"
  TRAJECTORY_OUTPUT_DIR: "/mnt/sda/MapScape/query/trajectory/"

  # 正弦曲线生成轨迹时的参数（用于 y 和 z 的偏移）
  A: 200                  # y 方向正弦幅值（单位：米）
  B: 50                   # z 方向正弦幅值（单位：米）

  ROLL: 0