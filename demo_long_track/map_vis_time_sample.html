      // ====== 初始化 Viewer（无二维影像，仅 3D Tiles 可选） ======
      const viewer = new Cesium.Viewer("cesiumContainer", {
        imageryProvider: false,
        baseLayerPicker: false,
        shouldAnimate: true,
        timeline: true,
        animation: true
      });
      viewer.imageryLayers.removeAll();
      viewer.scene.globe.baseColor = Cesium.Color.BLACK;
      viewer.scene.globe.enableLighting = true;
      viewer.scene.globe.depthTestAgainstTerrain = true;
  
      // ====== 时间范围：取两条轨迹的最大 t 作为 stop ======
      const start = Cesium.JulianDate.fromIso8601("2025-01-01T00:00:00Z");
      const lastTA = trajectoryA.length ? trajectoryA[trajectoryA.length-1][0] : 0;
      const lastTB = trajectoryB.length ? trajectoryB[trajectoryB.length-1][0] : 0;
      const stop = Cesium.JulianDate.addSeconds(start, Math.max(lastTA, lastTB), new Cesium.JulianDate());
  
      viewer.clock.startTime = start.clone();
      viewer.clock.stopTime = stop.clone();
      viewer.clock.currentTime = start.clone();
      viewer.clock.clockRange = Cesium.ClockRange.CLAMPED;
      viewer.clock.multiplier = 5;
      viewer.timeline.zoomTo(start, stop);
  
      // ====== 视域框到两条轨迹合并后的范围 ======
      function rectFromTrajs(trajs){
        const lons = trajs.flat().map(p => p[1]);
        const lats = trajs.flat().map(p => p[2]);
        if (!lons.length) return Cesium.Rectangle.fromDegrees(110, 25, 115, 30);
        return Cesium.Rectangle.fromDegrees(Math.min(...lons), Math.min(...lats),
                                            Math.max(...lons), Math.max(...lats));
      }
      const rectAll = rectFromTrajs([trajectoryA, trajectoryB]);
      viewer.camera.setView({ destination: rectAll });
  
      // ====== 工具：把 [t,lon,lat,alt] 填入 SampledPositionProperty ======
      const SYNC_BY_INDEX = false;
      const DT_INDEX = 1; // 若按下标强制同步，则每样本间隔秒数
      function fillSamples(prop, traj){
        traj.forEach((row, i) => {
          const t = SYNC_BY_INDEX ? i * DT_INDEX : row[0];
          const time = Cesium.JulianDate.addSeconds(start, t, new Cesium.JulianDate());
          const pos = Cesium.Cartesian3.fromDegrees(row[1], row[2], row[3]);
          prop.addSample(time, pos);
        });
      }
  
      // ====== 颜色 ======
      const COLOR_A = Cesium.Color.LIME.withAlpha(0.95);                          // 绿色
      const COLOR_B = Cesium.Color.fromCssColorString("#ff69b4").withAlpha(0.95); // HotPink
  
      // ====== 仅轨迹线 + 标签（无模型），带 orientation 便于跟随 ======
      function makeTrack(id, name, traj, color){
        const pos = new Cesium.SampledPositionProperty();
        fillSamples(pos, traj);
        return viewer.entities.add({
          id,
          name,
          availability: new Cesium.TimeIntervalCollection([new Cesium.TimeInterval({ start, stop })]),
          position: pos,
          orientation: new Cesium.VelocityOrientationProperty(pos), // 跟随需要
          path: {
            resolution: 1,
            material: new Cesium.PolylineGlowMaterialProperty({ glowPower: 0.2, color }),
            width: 16,
            leadTime: 0,
            trailTime: Number.POSITIVE_INFINITY
          },
          label: {
            text: name,
            font: "28px sans-serif",
            fillColor: color,
            pixelOffset: new Cesium.Cartesian2(0, -16),
            verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
            showBackground: true,
            backgroundColor: Cesium.Color.fromAlpha(Cesium.Color.BLACK, 0.6),
            distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0.0, 5e6)
          }
        });
      }
  
      // ====== 添加两条轨迹（ES_TRACK 绿色 / GT_TRACK 粉色） ======
      const uavA = makeTrack("ES_TRACK", "ES_TRACK", trajectoryA, COLOR_A);
      const uavB = makeTrack("GT_TRACK", "GT_TRACK", trajectoryB, COLOR_B);
  
      // ====== 先看全景，再启用“跟随 A”，避免被相机操作打断 ======
      viewer.zoomTo([uavA, uavB])
        .then(() => {}, () => {}) // 不管成功/失败都继续
        .then(() => {
          uavA.viewFrom = new Cesium.Cartesian3(-120, -120, 80); // 相机相对A的偏移，可调整
          viewer.trackedEntity = uavA; // 跟随 A
        });
  
      // ====== 键盘切换跟随对象：1 跟 A，2 跟 B，0 取消 ======
      document.addEventListener("keydown", (e) => {
        if (e.key === "1") {
          uavA.viewFrom = uavA.viewFrom || new Cesium.Cartesian3(-120, -120, 80);
          viewer.trackedEntity = uavA;
        } else if (e.key === "2") {
          uavB.viewFrom = uavB.viewFrom || new Cesium.Cartesian3(-120, -120, 80);
          viewer.trackedEntity = uavB;
        } else if (e.key === "0") {
          viewer.trackedEntity = undefined;
          viewer.camera.flyTo({ destination: rectAll, duration: 0.8 });
        }
      });
  
      // ====== 加载你的本地 3D Tiles（可选） ======
      Cesium.Cesium3DTileset.fromUrl("http://localhost:8078/Scene/Production_6.json", {
        maximumScreenSpaceError: 2,
        dynamicScreenSpaceError: true,
        skipLevelOfDetail: true
      }).then(ts => {
        viewer.scene.primitives.add(ts);
        return ts.readyPromise.then(() => viewer.flyTo(ts, { duration: 1.2 })).catch(()=>{});
      }).catch(err => console.error("3D Tiles 加载失败：", err));
